name: Deploy to Cloud Run

# Manually triggered for now (avoid accidental deploys). Once you're happy,
# add `push: branches: [main]` to auto-deploy on every push to main.
on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  SERVICE: carepal-hr-admin
  REGION: asia-south1           # Mumbai — closest to CarePal's Indian users
  ARTIFACT_REPO: carepal-hr-admin
  IMAGE_NAME: carepal-hr-admin

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub Actions needs the following repo secrets:
    #   GCP_PROJECT_ID            — e.g. carepal-hr-admin-prod
    #   GCP_SA_KEY                — contents of the service-account JSON key
    #   CLOUD_SQL_CONNECTION_NAME — project:region:instance (used by --add-cloudsql-instances)
    #   VITE_GOOGLE_CLIENT_ID     — Google OAuth Web Client ID; baked into the
    #                                Vite bundle at build time so the frontend
    #                                can show the Google sign-in button.
    #
    # Cloud Run reads these from Secret Manager at runtime:
    #   DATABASE_URL    — mysql://user:pass@host/db (Cloud SQL via proxy)
    #   GOOGLE_CLIENT_ID — same value as VITE_GOOGLE_CLIENT_ID; backend uses it
    #                      to verify ID-token audience claims.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build container image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build \
            --build-arg VITE_AUTH_MODE=google \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }} \
            -t $IMAGE .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push image to Artifact Registry
        run: docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=$IMAGE \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --cpu=1 \
            --memory=512Mi \
            --max-instances=3 \
            --set-env-vars=NODE_ENV=production,AUTH_MODE=google \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest \
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Deployed to: $URL"
          echo "::notice::Deployed to $URL"
